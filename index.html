<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Clientes</title>
    <link rel="stylesheet" href="src/css/style.css">

<body>
    <div class="dashboard-container">
        <!-- Barra Lateral / Header -->
        <header class="dashboard-header">
            <h1>Painel de Controle</h1>
            <button id="theme-toggle" class="btn-theme">Alternar Tema</button>
        </header>

        <!-- Conteúdo Principal -->
        <main class="main-content">
        
        <!-- Insira este bloco logo após a abertura da tag <main class="main-content"> -->
<section class="stats-container">
    <div class="card-stat">
        <h3>Total de Usuários</h3>
        <p id="stat-total">0</p>
    </div>
    <div class="card-stat stat-active">
        <h3>Ativos</h3>
        <p id="stat-active">0</p>
    </div>
    <div class="card-stat stat-inactive">
        <h3>Inativos</h3>
        <p id="stat-inactive">0</p>
    </div>
</section>
    
        <!-- Insira este bloco logo após a abertura da tag <main class="main-content"> -->
<section class="form-container">
    <h2>Cadastrar Novo Usuário</h2>

    <form id="user-form">
        <div class="form-group">
            <input type="text" id="new-name" placeholder="Nome completo" required>
        </div>
        <div class="form-group">
            <input type="email" id="new-email" placeholder="E-mail" required>
        </div>
        <button type="submit" class="btn-submit">Adicionar Usuário</button>
    </form>
</section>

            <div class="table-actions">
